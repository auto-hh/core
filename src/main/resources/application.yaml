server:
  port: 8080

spring:
  application:
    name: hh-match-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hh_match}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: resume, vacancy, matching

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: hh-match-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: ru.hh.match.infrastructure.adapter.kafka.dto.MatchResponseMessage
      auto-offset-reset: earliest

# ========== APPLICATION-SPECIFIC ==========
app:
  hh-api:
    base-url: https://api.hh.ru
    user-agent: "AutoHH/1.0.0 (dev@mail.ru)"
    rate-limit:
      max-requests-per-second: 5
      retry-max-attempts: 3
      retry-delay-ms: 1000
    endpoints:
      resumes: /resumes/mine
      vacancy-search: /vacancies
      vacancy-detail: /vacancies/{id}

  vacancy:
    search-limit: ${VACANCY_SEARCH_LIMIT:50}
    relevance-fields:
      - title
      - skills

  kafka:
    topics:
      match-request: match-request-topic
      match-response: match-response-topic
    batch-size: ${KAFKA_BATCH_SIZE:1}

  cache:
    match-results-ttl: ${CACHE_MATCH_TTL:3600}
    resume-ttl: ${CACHE_RESUME_TTL:1800}

  sse:
    timeout-ms: 300000

# ========== LOGGING ==========
logging:
  level:
    root: INFO
    ru.hh.match: DEBUG
    org.hibernate.SQL: DEBUG
  file:
    name: logs/hh-match-service.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
